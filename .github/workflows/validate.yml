name: Validate migration skill

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate skill structure, links, and migration invariants
        run: python migrate-spring-to-liberty/scripts/validate_skill.py
